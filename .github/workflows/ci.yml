name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate canon and references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild canonical index and reference map
        run: node scripts/prompt/build_linkmap.js

      - name: Lint (schema, refs, glossary, canon)
        run: npm run lint

      - name: Continuity and timeline checks
        run: npm run check

      - name: Dashboard smoke test
        run: node scripts/tests/test_dashboard.js

  links:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link check
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress --exclude-mail --max-concurrency 8 "**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
