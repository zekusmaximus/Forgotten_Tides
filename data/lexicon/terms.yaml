    status: canonical

  - id: term-0020
    term: Zero-Anchoring
    definition: Illegal technique using the pilot's self-memory alone as stabilizer.
    category: Navigation
    related_terms:
      - term-0001  # Anchor
      - term-0013  # Memory Drive
    first_appearance: The Archivist's Wake
    canonical_source: mechanics/ANCHOR_THEORY.md
    status: canonical

  - id: term-0021
    term: Light-Bequest
    definition: A memory stone willed across one missed generation, in which the donor and the intended hearer never met. When tuned, the stone sings in two registers — the donor's recorded memory and a hearer-shaped absence carved for a listener not yet born at the time of tuning. Light-bequests are unstable in memory drives, unsafe to burn, and honored only by being heard by their intended hearer or released into dark matter; their value lies in the inheritance, not the substance.
    category: Memory Types
    related_terms:
      - term-0014  # Memory Stone
      - term-0016  # Personal Memory
      - term-0004  # Civic Memory
    first_appearance: The Light Inheritance
    canonical_source: stories/short_story/the_light_inheritance/manuscript.md
    status: draft
    aliases:
      - Inheritance Stone
      - Inheritance Memory

  - id: term-0022
    term: Continuity Cleric
    definition: A specialist of the Archivist Orders trained to maintain the conceptual coherence of stations and structures through daily recitation liturgies. Continuity Clerics use focused institutional memory — projected outward through acoustic baffling and trained concentration — to remind a structure of its own architecture, preventing conceptual drift and structural softening.
    category: Factions
    related_terms:
      - term-0005  # Coherence
      - term-0006  # Conceptual Drift
      - term-0004  # Civic Memory
    first_appearance: The Liturgy of Rust
    canonical_source: stories/short_story/the_liturgy_of_rust/manuscript.md
    status: draft

  - id: term-0023
    term: Liturgy of the Hull
    definition: The daily recitation performed by a Continuity Cleric to maintain a station's structural coherence. The liturgy names the station's physical properties — hull composition, deck functions, airlock seals — projecting institutional memory outward to counteract conceptual drift. A cleric's doubt or loss of conviction during the liturgy can accelerate the very decay it is meant to prevent.
    category: Mechanics
    related_terms:
      - term-0005  # Coherence
      - term-0006  # Conceptual Drift
    first_appearance: The Liturgy of Rust
    canonical_source: stories/short_story/the_liturgy_of_rust/manuscript.md
    status: draft

  - id: term-0024
    term: Structural Softening
    definition: A localized manifestation of conceptual drift in which physical structures lose definition — edges blur, materials become indistinct, and objects forget their function. Touching a softening object risks transferring the forgetting to the person's own body. Softening is an early-stage symptom that precedes full conceptual collapse.
    category: Memory Physics
    related_terms:
      - term-0006  # Conceptual Drift
      - term-0019  # Thinning
      - term-0005  # Coherence
    first_appearance: The Liturgy of Rust
    canonical_source: stories/short_story/the_liturgy_of_rust/manuscript.md
    status: draft

  - id: term-0025
    term: Reliquarist
    definition: A specialist of the Archivist Orders trained to craft, tune, and audit memory stones. Reliquarists work in audit halls equipped with tuning cradles, verifying the provenance, viewpoint, and resonance stability of pledged memories before they are sealed for civic, personal, or light-bequest use. Junior Reliquarists are authorized to issue a limited number of junior seals per year, certifying audits at their own anchor cost when the chain of provenance cannot be fully verified.
    category: Factions
    related_terms:
      - term-0014  # Memory Stone
      - term-0022  # Continuity Cleric
      - term-0001  # Anchor
    first_appearance: The Reliquarist's Doubt
    canonical_source: stories/short_story/the_reliquarists_doubt/manuscript.md
    status: draft

  - id: term-0026
    term: Tuning Cradle
    definition: The two-armed brass apparatus used by Reliquarists to audit memory stones. A stone placed on the cradle's resonance plate sings back its own internal tone; stable memory rings true, drifting memory wobbles, and corrupted memory howls or goes silent. The cradle does not tell a Reliquarist what a memory is — only whether the memory believes itself. The standard sixth-generation cradle pattern was codified at the Tessarine Vault and is named for that site.
    category: Mechanics
    related_terms:
      - term-0014  # Memory Stone
      - term-0005  # Coherence
      - term-0025  # Reliquarist
    first_appearance: The Reliquarist's Doubt
    canonical_source: stories/short_story/the_reliquarists_doubt/manuscript.md
    status: draft
