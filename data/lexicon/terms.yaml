    first_appearance: The Archivist's Wake
    canonical_source: mechanics/MEMORY_PHYSICS.md
    status: canonical

  - id: term-0006
    term: Conceptual Drift
    definition: Loss of meaning causing physical misalignment in structures or environments.
    category: Memory Physics
    related_terms:
