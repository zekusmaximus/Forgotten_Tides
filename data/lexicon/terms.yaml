  - id: term-0008
    term: Corridor Thinning
    definition: A state in which the corridor loses definition; matter becomes semi-nonphysical.
    category: Navigation
    related_terms:
      - term-0007  # Corridor
      - term-0019  # Thinning
      - term-0017  # Raveling
    first_appearance: The Archivist's Wake
    canonical_source: mechanics/CORRIDOR_MECHANICS.md
    status: canonical

  - id: term-0009
