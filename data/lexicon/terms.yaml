# The Forgotten Tides Lexicon - Structured Terms
# This file contains all canonical terms in a structured YAML format
# Governance: Changes require PR review and OWNER approval per docs/governance/lexicon.md
#
# `id` and `related_terms` use canonical IDs (lowercase, hyphenated) per
# docs/CANONICAL_ID_SCHEMA.md. The trailing comment on each related_terms
# entry names the target term for human readers.

terms:
  - id: term-0001
    term: Anchor
    definition: A memory or mental construct used by pilots to maintain selfhood under corridor stress.
    category: Memory Physics
    related_terms:
      - term-0002  # Anchor Burn
      - term-0003  # Anchor Knot
      - term-0013  # Memory Drive
    first_appearance: The Archivist's Wake
    canonical_source: mechanics/ANCHOR_THEORY.md
    status: canonical

  - id: term-0002
    term: Anchor Burn
    definition: Permanent loss of an anchor due to memory-drive operation.
    category: Memory Physics
    related_terms:
      - term-0001  # Anchor
      - term-0013  # Memory Drive
      - term-0015  # Oblivion
    first_appearance: The Archivist's Wake
    canonical_source: mechanics/ANCHOR_THEORY.md
    status: canonical

  - id: term-0003
    term: Anchor Knot
    definition: One of a pilot's structured, internal memory-checkpoints. Numbered.
    category: Memory Physics
    related_terms:
      - term-0001  # Anchor
    first_appearance: The Archivist's Wake
    canonical_source: mechanics/ANCHOR_THEORY.md
    status: canonical

  - id: term-0004
    term: Civic Memory
    definition: Large-scale cultural or institutional memories; powerful but volatile when used for navigation.
    category: Memory Types
    related_terms:
