<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilot Manual · The Forgotten Tides</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--void-1); overflow: hidden; }
    /* Scrollbar styling — keeps the canvas feeling pressurized */
    main::-webkit-scrollbar, aside::-webkit-scrollbar { width: 8px; }
    main::-webkit-scrollbar-track, aside::-webkit-scrollbar-track { background: var(--void-1); }
    main::-webkit-scrollbar-thumb, aside::-webkit-scrollbar-thumb { background: var(--void-5); border-radius: 4px; }
    main::-webkit-scrollbar-thumb:hover, aside::-webkit-scrollbar-thumb:hover { background: var(--void-6); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="Content.jsx"></script>
  <script type="text/babel" src="Manual.jsx"></script>

  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Manual />);
  </script>
</body>
</html>
